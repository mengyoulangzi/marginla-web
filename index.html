<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marginla Luxury</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at top,#111 0%,#000 60%);
color:#fcd535;
text-align:center;
overflow-x:hidden;
transition:0.5s;
}

/* GOLD GLOW */
.glow{
text-shadow:0 0 15px #fcd535;
}

/* ENTER SCREEN */
#enterScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

#enterBtn{
padding:15px 40px;
border:2px solid gold;
background:transparent;
color:gold;
font-size:20px;
cursor:pointer;
transition:0.3s;
}

#enterBtn:hover{
background:gold;
color:black;
box-shadow:0 0 40px gold;
}

.container{
display:none;
padding:30px;
}

/* AVATAR */
.avatar{
width:150px;
border-radius:50%;
border:3px solid gold;
box-shadow:0 0 40px gold;
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{box-shadow:0 0 20px gold;}
to{box-shadow:0 0 60px gold;}
}

/* SENTIMENT BAR */
#sentimentBar{
width:300px;
height:20px;
border:1px solid gold;
margin:20px auto;
}

#sentimentFill{
height:100%;
background:gold;
width:50%;
}

/* ORDER BOOK */
#orderBook{
width:320px;
margin:20px auto;
font-size:14px;
text-align:left;
}

/* LIQUIDATION POPUP */
.popup{
position:fixed;
right:20px;
bottom:20px;
background:black;
border:1px solid gold;
padding:10px 20px;
animation:slide 0.5s ease;
}

@keyframes slide{
from{transform:translateX(200px);}
to{transform:translateX(0);}
}

/* TRADE GAME */
.trade-btn{
margin:10px;
padding:10px 20px;
border:1px solid gold;
background:transparent;
color:gold;
cursor:pointer;
}

.trade-btn:hover{
background:gold;
color:black;
}

.whale-mode{
background:linear-gradient(45deg,#000,#1a1a1a,#000);
}
</style>
</head>

<body>

<div id="enterScreen">
<h1 class="glow">WELCOME WHALE 🐋</h1>
<button id="enterBtn">ENTER PORTFOLIO</button>
</div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainContent">

<img class="avatar" src="avatar.jpg">
<h1 class="glow">MARGINLA</h1>

<h3>Portfolio: $<span id="money">1,248,750</span></h3>
<div>PNL: <span id="pnl">+0</span></div>

<div id="sentimentBar">
<div id="sentimentFill"></div>
</div>
<div id="sentimentText"></div>

<div id="orderBook"></div>

<button class="trade-btn" onclick="trade('buy')">BUY</button>
<button class="trade-btn" onclick="trade('sell')">SELL</button>
<button class="trade-btn" onclick="toggleWhale()">🐋 Whale Mode</button>

</div>

<script>
let money=1248750;
let pnl=0;
let whale=false;

/* ENTER */
document.getElementById("enterBtn").onclick=function(){
document.getElementById("enterScreen").style.display="none";
document.getElementById("mainContent").style.display="block";
document.getElementById("bgMusic").play();
}

/* PNL */
setInterval(()=>{
let change=Math.floor(Math.random()*200-100);
if(whale) change*=3;
money+=change;
pnl+=change;
document.getElementById("money").innerText=money.toLocaleString();
document.getElementById("pnl").innerText=(pnl>=0?"+":"")+pnl.toLocaleString();
document.getElementById("pnl").style.color=pnl>=0?"#00ff88":"#ff4444";
},1000);

/* SENTIMENT */
setInterval(()=>{
let percent=Math.floor(Math.random()*60+30);
document.getElementById("sentimentFill").style.width=percent+"%";
document.getElementById("sentimentText").innerText="Market Sentiment: "+percent+"% Bullish";
},3000);

/* ORDER BOOK */
setInterval(()=>{
let html="";
for(let i=0;i<5;i++){
let price=(62000+Math.random()*100).toFixed(2);
let size=(Math.random()*5).toFixed(2);
html+="<div>"+price+" | "+size+"</div>";
}
document.getElementById("orderBook").innerHTML=html;
},1500);

/* LIQUIDATION */
setInterval(()=>{
let popup=document.createElement("div");
popup.className="popup";
let val=Math.floor(Math.random()*50000);
popup.innerText="Liquidation -$"+val.toLocaleString();
document.body.appendChild(popup);
setTimeout(()=>popup.remove(),3000);
},10000);

/* TRADE GAME */
function trade(type){
let result=Math.random()>0.5;
let popup=document.createElement("div");
popup.className="popup";
popup.innerText=result?"Trade Win 💰":"Trade Loss ❌";
document.body.appendChild(popup);
setTimeout(()=>popup.remove(),2000);
}

/* WHALE MODE */
function toggleWhale(){
whale=!whale;
document.body.classList.toggle("whale-mode");
}

/* FLASH CRASH */
setInterval(()=>{
document.body.style.background="darkred";
setTimeout(()=>document.body.style.background="radial-gradient(circle at top,#111 0%,#000 60%)",1000);
},30000);

/* CLICK GOLD SPARK */
document.addEventListener("click",e=>{
let spark=document.createElement("div");
spark.style.position="absolute";
spark.style.left=e.pageX+"px";
spark.style.top=e.pageY+"px";
spark.style.color="gold";
spark.innerText="💰";
document.body.appendChild(spark);
setTimeout(()=>spark.remove(),800);
});
</script>

</body>
</html>
