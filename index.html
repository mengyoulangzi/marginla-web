<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marginla</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(-45deg, #0f0f0f, #001f3f, #0f0f0f, #001a33);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    font-family: 'Orbitron', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    margin-top: 100px;
}

.avatar {
    width: 130px;
    border-radius: 50%;
    border: 3px solid #00f7ff;
    box-shadow: 0 0 20px #00f7ff;
    margin-bottom: 20px;
}

h1 {
    font-size: 40px;
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
}

.bio {
    color: #aaa;
    margin-bottom: 30px;
}

.gif {
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 0 20px #00f7ff;
    margin-bottom: 30px;
}

.links a {
    display: block;
    width: 230px;
    margin: 10px auto;
    padding: 12px;
    background: transparent;
    border: 2px solid #00f7ff;
    color: #00f7ff;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

.links a:hover {
    background: #00f7ff;
    color: black;
    box-shadow: 0 0 20px #00f7ff;
}
</style>
</head>

<body>

<!-- Nhạc nền -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<img class="avatar" src="avatar.jpg">

<h1>MARGINLA</h1>

<p class="bio">Crypto Trader • Web3 Investor • Risk Taker</p>

<img class="gif" src="trading.gif">

<div class="links">
<a href="#">Binance</a>
<a href="#">Twitter</a>
<a href="#">Telegram</a>
</div>

</div>

</body>
</html>
