<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Market Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:white;
  font-family:Arial;
}
header{
  padding:15px;
  font-size:22px;
  font-weight:bold;
  border-bottom:1px solid #222;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:12px;
  border-bottom:1px solid #222;
  text-align:left;
}
th{
  background:#111;
}
tr:hover{
  background:#161b22;
  cursor:pointer;
}
.green{color:#00ff99;}
.red{color:#ff4d4d;}
button{
  padding:8px 15px;
  background:#00ffcc;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
.card{
  padding:20px;
}
canvas{
  background:#111;
}
</style>
</head>
<body>

<header>
💎 Crypto Market Terminal
<button onclick="login()" style="float:right;">Login</button>
</header>

<div id="market"></div>

<div id="detail" style="display:none;" class="card">
<h2 id="coinName"></h2>
<p id="coinPrice"></p>
<canvas id="chart"></canvas>
<button onclick="back()">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyDT905UnWKjyCZB2CzgzgLIk_P6NNslj7U",
  authDomain:"lilo-f8779.firebaseapp.com",
  projectId:"lilo-f8779",
  storageBucket:"lilo-f8779.firebasestorage.app",
  messagingSenderId:"542537325157",
  appId:"1:542537325157:web:cd19e01a94a7535641848c"
};

initializeApp(firebaseConfig);
const auth=getAuth();

window.login=async()=>{
  const provider=new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
  alert("Logged in!");
}

async function loadMarket(){
  const res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&sparkline=false");
  const data=await res.json();

  let html="<table>";
  html+="<tr><th>#</th><th>Name</th><th>Price</th><th>24h %</th><th>Market Cap</th><th>Volume</th></tr>";

  data.forEach((coin,i)=>{
    const change=coin.price_change_percentage_24h;
    html+=`
    <tr onclick="viewCoin('${coin.id}')">
    <td>${i+1}</td>
    <td>${coin.name}</td>
    <td>$${coin.current_price.toLocaleString()}</td>
    <td class="${change>=0?'green':'red'}">${change.toFixed(2)}%</td>
    <td>$${coin.market_cap.toLocaleString()}</td>
    <td>$${coin.total_volume.toLocaleString()}</td>
    </tr>
    `;
  });

  html+="</table>";
  document.getElementById("market").innerHTML=html;
}

window.viewCoin=async(id)=>{
  document.getElementById("market").style.display="none";
  document.getElementById("detail").style.display="block";

  const res=await fetch(`https://api.coingecko.com/api/v3/coins/${id}?localization=false&sparkline=true`);
  const data=await res.json();

  document.getElementById("coinName").innerText=data.name;
  document.getElementById("coinPrice").innerText="Price: $"+data.market_data.current_price.usd;

  const prices=data.market_data.sparkline_7d.price;

  const ctx=document.getElementById("chart");
  new Chart(ctx,{
    type:"line",
    data:{
      labels:prices.map((_,i)=>i),
      datasets:[{
        data:prices,
        borderColor:"#00ffcc"
      }]
    }
  });
}

window.back=()=>{
  document.getElementById("market").style.display="block";
  document.getElementById("detail").style.display="none";
}

loadMarket();

</script>
</body>
</html>
