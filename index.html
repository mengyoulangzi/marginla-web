<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marginla Billionaire Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at center,#111,#000);
color:#fcd535;
overflow:hidden;
text-align:center;
}

/* Glass container */
.glass{
backdrop-filter:blur(15px);
background:rgba(255,215,0,0.05);
border:1px solid rgba(255,215,0,0.3);
border-radius:20px;
padding:20px;
width:350px;
margin:auto;
margin-top:50px;
box-shadow:0 0 40px rgba(255,215,0,0.3);
}

/* Avatar glow */
.avatar{
width:150px;
border-radius:50%;
border:3px solid gold;
box-shadow:0 0 50px gold;
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{box-shadow:0 0 20px gold;}
to{box-shadow:0 0 70px gold;}
}

.counter{
font-size:26px;
margin:15px;
}

.green{color:#00ff88;}
.red{color:#ff4444;}

button{
padding:10px 25px;
border:none;
background:gold;
color:black;
cursor:pointer;
border-radius:8px;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
}

.popup{
position:fixed;
top:20px;
right:20px;
background:#111;
padding:15px;
border-left:5px solid red;
color:white;
display:none;
}

/* Explosion */
.explode{
position:absolute;
color:gold;
font-size:20px;
pointer-events:none;
animation:boom 0.6s forwards;
}

@keyframes boom{
to{transform:scale(3);opacity:0;}
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="glass">
<img src="avatar.jpg" class="avatar">
<h1>MARGINLA</h1>

<div class="counter">
Portfolio: $<span id="money">1248750</span>
(<span id="pnl" class="green">+0</span>)
</div>

<div>BTC Price: $<span id="btcPrice">Loading...</span></div>

<br>
<button onclick="toggleWhale()">🐋 Whale Mode</button>
<button onclick="startGame()">🎮 Trade</button>

</div>

<div class="popup" id="liq">⚠️ Massive Liquidation Detected!</div>

<script>

/* MUSIC START */
document.body.addEventListener("click",()=>{
document.getElementById("bgMusic").play();
},{once:true});

/* PORTFOLIO */
let money=1248750;
let pnl=0;

setInterval(()=>{
let change=Math.floor(Math.random()*400-200);
money+=change;
pnl+=change;

document.getElementById("money").innerText=money.toLocaleString();
document.getElementById("pnl").innerText=(pnl>=0?"+":"")+pnl.toLocaleString();
document.getElementById("pnl").className=pnl>=0?"green":"red";

if(Math.abs(change)>300){
document.getElementById("liq").style.display="block";
setTimeout(()=>document.getElementById("liq").style.display="none",3000);
}
},1000);

/* BTC REAL API */
async function getBTC(){
try{
let res=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
let data=await res.json();
document.getElementById("btcPrice").innerText=parseFloat(data.price).toLocaleString();
}catch{}
}
setInterval(getBTC,5000);
getBTC();

/* Whale Mode */
let whale=false;
function toggleWhale(){
whale=!whale;
document.body.style.background=whale?
"radial-gradient(circle at center,#331a00,#000)":
"radial-gradient(circle at center,#111,#000)";
}

/* Explosion click */
document.addEventListener("click",e=>{
let boom=document.createElement("div");
boom.className="explode";
boom.innerText="💥";
boom.style.left=e.pageX+"px";
boom.style.top=e.pageY+"px";
document.body.appendChild(boom);
setTimeout(()=>boom.remove(),600);
});

/* Mini trading game */
function startGame(){
let result=Math.random()>0.5?1000:-1000;
money+=result;
alert(result>0?"Trade Win +$1000":"Trade Loss -$1000");
}

/* THREE JS BACKGROUND */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry=new THREE.BufferGeometry();
const vertices=[];
for(let i=0;i<2000;i++){
vertices.push(
THREE.MathUtils.randFloatSpread(2000),
THREE.MathUtils.randFloatSpread(2000),
THREE.MathUtils.randFloatSpread(2000)
);
}
geometry.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3));
const material=new THREE.PointsMaterial({color:0xffd700});
const stars=new THREE.Points(geometry,material);
scene.add(stars);

camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
stars.rotation.x+=0.0005;
stars.rotation.y+=0.0005;
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
