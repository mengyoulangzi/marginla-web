<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marginla | Web3 Crypto Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Orbitron', sans-serif;
        color: #fcd535;
        text-align: center;
        background: linear-gradient(270deg, #000000, #050505, #111111, #000000);
        background-size: 800% 800%;
        animation: bgMove 20s infinite;
        overflow-x: hidden; /* Chống tràn ngang trên mobile */
    }

    @keyframes bgMove {
        0% { background-position: 0% 50% }
        50% { background-position: 100% 50% }
        100% { background-position: 0% 50% }
    }

    /* MÀN HÌNH CHỜ (ENTER SCREEN) */
    #enterScreen {
        position: fixed;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 999;
    }

    #enterBtn {
        padding: 16px 45px;
        border: 2px solid #fcd535;
        background: transparent;
        color: #fcd535;
        font-size: 22px;
        font-family: 'Orbitron', sans-serif;
        cursor: pointer;
        transition: .3s;
        border-radius: 8px;
    }

    #enterBtn:hover {
        background: #fcd535;
        color: black;
        box-shadow: 0 0 40px #fcd535;
        transform: scale(1.1);
    }

    /* NỘI DUNG CHÍNH */
    .container {
        margin-top: 50px;
        display: none;
        animation: fadeIn 2s;
        padding-bottom: 50px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px) }
        to { opacity: 1 }
    }

    /* AVATAR */
    .avatar {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        border: 3px solid #fcd535;
        box-shadow: 0 0 40px #fcd535;
        transition: .3s;
        object-fit: cover;
    }

    .avatar:hover {
        transform: scale(1.1);
        box-shadow: 0 0 60px #fcd535;
    }

    h1 {
        font-size: 36px;
        text-shadow: 0 0 30px #fcd535;
        margin: 10px 0;
    }

    /* PORTFOLIO & THÔNG SỐ */
    .counter {
        font-size: 24px;
        margin: 15px;
        transition: .3s;
    }
    .green { color: #00ff88; }
    .red { color: #ff4444; }

    /* NÚT CHỌN CHART */
    .chart-btns button {
        background: transparent;
        border: 1px solid #fcd535;
        color: #fcd535;
        padding: 8px 16px;
        margin: 5px;
        font-family: 'Orbitron', sans-serif;
        cursor: pointer;
        border-radius: 4px;
    }
    .chart-btns button:hover {
        background: #fcd535;
        color: black;
    }

    /* KHUNG CHART BỌC LẠI CHO MOBILE */
    #chart-container {
        width: 90%;
        max-width: 400px;
        height: 350px;
        margin: 0 auto 20px auto;
    }

    /* CARD DOMA ASSETS */
    .asset-card {
        margin: 20px auto; 
        width: 85%; 
        max-width: 350px; 
        padding: 15px; 
        border: 1px solid #fcd535; 
        border-radius: 8px; 
        text-align: left; 
        background: rgba(0,0,0,0.6);
        box-shadow: 0 0 15px rgba(252, 213, 53, 0.2);
    }

    /* LINK MẠNG XÃ HỘI */
    .links a {
        display: block;
        width: 80%;
        max-width: 300px;
        margin: 12px auto;
        padding: 14px;
        border: 2px solid #fcd535;
        color: #fcd535;
        text-decoration: none;
        border-radius: 8px;
        transition: .3s;
    }

    .links a:hover {
        background: #fcd535;
        color: black;
        box-shadow: 0 0 25px #fcd535;
        transform: scale(1.05);
    }

    /* HIỆU ỨNG */
    .coin {
        position: fixed;
        top: -50px;
        color: #fcd535;
        font-size: 20px;
        animation: fall linear infinite;
        z-index: -1;
    }
    @keyframes fall {
        to { transform: translateY(110vh); }
    }

    .alert {
        position: fixed;
        top: 20px;
        right: 20px;
        background: red;
        color: white;
        padding: 15px;
        border-radius: 6px;
        display: none;
        box-shadow: 0 0 20px red;
        z-index: 1000;
    }
</style>
</head>
<body>

<div id="enterScreen">
    <h1>WELCOME WHALE 🐳</h1>
    <button id="enterBtn">ENTER THE MARKET</button>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainContent">

    <img class="avatar" id="avatar" src="avatar.jpg" alt="Avatar">

    <h1>MARGINLA</h1>

    <div class="counter">
        Portfolio: $<span id="money">Loading...</span><br>
        <span id="pnl" style="font-size: 18px;">--</span>
    </div>

    <div class="asset-card">
        <h3 style="margin-top: 0; font-size: 16px;">🔥 DOMA ASSETS (ON-CHAIN)</h3>
        
        <div style="display: flex; justify-content: space-between; border-bottom: 1px dashed #555; padding-bottom: 10px; margin-bottom: 10px;">
            <span>trading247.xyz</span>
            <span id="domain1-status" style="color: #888; font-size: 14px;">Fetching...</span>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <span style="font-size: 14px;">Buyout Price:</span>
            <strong id="domain1-price" style="color: #00ff88; font-size: 14px;">--</strong>
        </div>
    </div>

    <div class="chart-btns">
        <button onclick="loadChart('BTCUSDT')">BTC</button>
        <button onclick="loadChart('ETHUSDT')">ETH</button>
        <button onclick="loadChart('SOLUSDT')">SOL</button>
    </div>

    <div id="chart-container">
        <div id="chart"></div>
    </div>

    <div class="links">
        <a href="https://x.com/lanqiuzhiwang" target="_blank">Twitter (X)</a>
        <a href="https://t.me/@Arthurchen1" target="_blank">Telegram Channel</a>
        <a href="#">SEAL 911 (Security Help)</a>
    </div>

</div>

<div class="alert" id="alertBox">⚠️ LIQUIDATION DETECTED</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script>
    // 1. XỬ LÝ NÚT ENTER & NHẠC
    document.getElementById("enterBtn").onclick = function() {
        document.getElementById("enterScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        document.getElementById("bgMusic").play().catch(e => console.log("Trình duyệt chặn autoplay audio"));
    }

    // 2. LOAD CHART TRADINGVIEW (Đã fix full width cho mobile)
    function loadChart(pair){
        document.getElementById("chart").innerHTML = "";
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:" + pair,
            "interval": "15",
            "timezone": "Asia/Ho_Chi_Minh",
            "theme": "dark",
            "style": "1",
            "hide_top_toolbar": true,
            "hide_legend": true,
            "container_id": "chart"
        });
    }
    loadChart("BTCUSDT"); // Load mặc định BTC

    // 3. TÍCH HỢP DATA REAL-TIME TỪ COINGECKO
    const myPortfolio = {
        "bitcoin": 10.5, 
        "ethereum": 150.25,
        "solana": 500
    };

    async function updateLivePortfolio() {
        const ids = Object.keys(myPortfolio).join(',');
        const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            let totalValue = 0;
            let totalChange24h = 0;

            for (const [coin, amount] of Object.entries(myPortfolio)) {
                if(data[coin]) {
                    const price = data[coin].usd;
                    const change = data[coin].usd_24h_change;
                    totalValue += price * amount;
                    totalChange24h += (price * amount) * (change / 100);
                }
            }

            document.getElementById("money").innerText = totalValue.toLocaleString(undefined, {maximumFractionDigits: 0});
            
            const pnlElement = document.getElementById("pnl");
            const sign = totalChange24h >= 0 ? "+" : "";
            pnlElement.innerText = `Biến động 24h: ${sign}$${totalChange24h.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
            pnlElement.className = totalChange24h >= 0 ? "green" : "red";

        } catch (error) {
            console.error("Lỗi API CoinGecko:", error);
            document.getElementById("money").innerText = "1,248,750"; // Data dự phòng
        }
    }
    updateLivePortfolio();
    setInterval(updateLivePortfolio, 60000); // Cập nhật mỗi 1 phút

    // 4. ĐỌC SMART CONTRACT TỪ DOMA PROTOCOL
    async function fetchDomaData() {
        try {
            // Đây là chỗ sau này bạn thay bằng Contract thật của dự án Doma
            const DOMA_CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; 
            const DOMA_ABI = ["function getDomainInfo(string) view returns (bool, uint256)"];
            const provider = new ethers.providers.JsonRpcProvider("https://rpc.ankr.com/eth");
            const contract = new ethers.Contract(DOMA_CONTRACT_ADDRESS, DOMA_ABI, provider);
            
            // Cố tình gọi data để test kết nối (Sẽ lỗi do contract giả, rơi xuống block catch bên dưới)
            await contract.getDomainInfo("trading247.xyz");

        } catch (error) {
            // DÙNG DATA MẪU TRONG LÚC CHỜ BẠN CÓ CONTRACT THẬT
            setTimeout(() => {
                const statusElement = document.getElementById("domain1-status");
                const priceElement = document.getElementById("domain1-price");
                statusElement.innerText = "🟢 Active Listing";
                statusElement.style.color = "#00ff88";
                priceElement.innerText = "2.5 ETH";
            }, 1500);
        }
    }
    fetchDomaData();

    // 5. HIỆU ỨNG MƯA COIN VÀ CẢNH BÁO
    function createCoin(){
        const coin = document.createElement("div");
        coin.className = "coin";
        coin.innerText = Math.random() > 0.5 ? "₿" : "Ξ";
        coin.style.left = Math.random() * 100 + "vw";
        coin.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(coin);
        setTimeout(() => { coin.remove() }, 5000);
    }
    setInterval(createCoin, 400);

    setInterval(function(){
        if(Math.random() < 0.05){ // 5% cơ hội hiện cảnh báo mỗi 5s
            let box = document.getElementById("alertBox");
            box.style.display = "block";
            setTimeout(() => box.style.display = "none", 3000);
        }
    }, 5000);
</script>

</body>
</html>
