<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marginla</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: #fcd535;
    text-align: center;
    overflow-x: hidden;
}

/* màn hình enter */
#enterScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

#enterBtn {
    padding: 15px 40px;
    border: 2px solid #fcd535;
    color: #fcd535;
    background: transparent;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s;
}

#enterBtn:hover {
    background: #fcd535;
    color: black;
    box-shadow: 0 0 25px #fcd535;
}

/* nội dung chính */
.container {
    margin-top: 100px;
    display: none;
}

.avatar {
    width: 140px;
    border-radius: 50%;
    border: 3px solid #fcd535;
    box-shadow: 0 0 25px #fcd535;
    margin-bottom: 20px;
}

h1 {
    font-size: 42px;
    text-shadow: 0 0 15px #fcd535;
}

.bio {
    color: #aaa;
    margin-bottom: 30px;
}

.counter {
    font-size: 26px;
    margin: 20px;
    color: white;
    text-shadow: 0 0 10px #fcd535;
}

.links a {
    display: block;
    width: 240px;
    margin: 12px auto;
    padding: 14px;
    border: 2px solid #fcd535;
    color: #fcd535;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.links a:hover {
    background: #fcd535;
    color: black;
    box-shadow: 0 0 25px #fcd535;
}
</style>
</head>

<body>

<!-- ENTER SCREEN -->
<div id="enterScreen">
    <h1>WELCOME WHALE 🐳</h1>
    <button id="enterBtn">ENTER THE MARKET</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent">

<img class="avatar" src="avatar.jpg">

<h1>MARGINLA</h1>
<p class="bio">Binance Trader • Whale Mode Activated</p>

<div class="counter">
Portfolio: $<span id="money">1248750</span>
</div>

<!-- TradingView Widget -->
<div style="margin:30px;">
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "width": 350,
  "height": 400,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "15",
  "timezone": "Asia/Ho_Chi_Minh",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "toolbar_bg": "#000000",
  "enable_publishing": false,
  "hide_top_toolbar": true,
  "hide_legend": true
});
</script>
</div>

<div class="links">
<a href="#">Binance</a>
<a href="#">Twitter</a>
<a href="#">Telegram</a>
</div>

</div>

<script>
// ENTER EFFECT
document.getElementById("enterBtn").onclick = function() {
    document.getElementById("enterScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("bgMusic").play();
}

// MONEY COUNTER INCREASE
let money = 1248750;
setInterval(function() {
    money += Math.floor(Math.random() * 50);
    document.getElementById("money").innerText = money.toLocaleString();
}, 1000);
</script>

</body>
</html>
